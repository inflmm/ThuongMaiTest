spring.application.name=ThuongMaiEurekaProduct
server.port=8443
eureka.client.serviceUrl.defaultZone = http://localhost:8761/eureka
spring.datasource.url=jdbc:mysql://localhost:3306/ThuongMaiEureka
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.address=0.0.0.0
# Bo qua viec luu tai nguyen tinh, dung khi dang develop
spring.web.resources.cache.period=0
spring.thymeleaf.cache=false
# Kich thuoc 1 file toi da
spring.servlet.multipart.max-file-size=10MB
# Kich thuoc toan bo file toi da
spring.servlet.multipart.max-request-size=50MB

# Cau hinh chung chi SSL
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-password=123456
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=tomcat

# Kich hoat HTTP/2
server.http2.enabled=true