<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập Quản trị</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/assets/image/eslint-16-svgrepo-com.svg}">
    <style>
        /* CSS nội khối để load nhanh */
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f7f6; margin: 0; }
        .login-card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 350px; }
        .login-card h2 { text-align: center; color: #333; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; }
        .form-group input { width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 0.75rem; background: #2c3e50; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Admin Login</h2>
        <div class="form-group">
            <label>Tài khoản</label>
            <input type="text" id="admin-user" placeholder="Username">
        </div>
        <div class="form-group">
            <label>Mật khẩu</label>
            <input type="password" id="admin-pass" placeholder="Password">
        </div>
        <button onclick="handleAdminLogin()">Đăng nhập</button>
    </div>

    <script th:src="@{/assets/js/admin/admin-core.js}"></script>
</body>
</html>
